name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run Quality Gate
        run: bash scripts/quality-gate.sh

      - name: Validate OBLE Draft Bundle
        run: bash scripts/validate-oble.sh
